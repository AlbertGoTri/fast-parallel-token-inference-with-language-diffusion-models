# promptfooconfig.yaml
# Evaluation configuration for the Student Model (LLaDA)
#
# USAGE:
#   1. Ensure Ollama is running: ollama pull llama3.1:8b
#   2. Ensure serve_llada.py is running (python serve_llada.py)
#   3. Run: npx promptfoo eval
#   4. Generate HTML report: python generate_report.py
#
# DESIGN NOTE — why type:python with inlined judge():
#   promptfoo runs type:python assertion code in a temp directory, so external
#   imports fail. The judge() function is defined inline in every assertion's
#   value block so there are no import or path dependencies whatsoever.
#   This is the only approach that survives promptfoo's temp-file execution model.

evaluateOptions:
  maxConcurrency: 1

env:
  PROMPTFOO_REQUEST_TIMEOUT_MS: "3600000"

providers:
  - id: file://llada_api_provider.py
    label: "LLaDA Student"

prompts:
  - '{{prompt}}'

tests:

  # ---------------------------------------------------------------------------
  # 1. Football coach motivational speech
  # ---------------------------------------------------------------------------
  - vars:
      prompt: "Act as a football coach. My team is losing 2-0 at halftime. What should I say to my players to motivate them for the second half?"
    assert:
      - type: python
        value: |
          import json, urllib.request
          def judge(out, q):
            p = json.dumps({"model":"llama3.1:8b","stream":False,"options":{"temperature":0,"num_predict":256},"messages":[{"role":"system","content":"Respond ONLY with JSON: {\"answer\":\"Yes\",\"reason\":\"...\"} or {\"answer\":\"No\",\"reason\":\"...\"}. No other text."},{"role":"user","content":f"<o>{out}</o>\n<Question>{q}</Question>"}]}).encode()
            r = urllib.request.urlopen(urllib.request.Request("http://127.0.0.1:11434/api/chat",data=p,headers={"Content-Type":"application/json"}),timeout=300)
            return json.loads(json.loads(r.read()).get("message",{}).get("content","{}")).get("answer","").lower().strip()=="yes"
          return judge(output, "Does the output provide genuine words of encouragement or motivation for the players?")

