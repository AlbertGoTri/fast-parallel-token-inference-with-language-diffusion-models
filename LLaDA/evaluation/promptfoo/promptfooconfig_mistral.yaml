env:
  PROMPTFOO_REQUEST_TIMEOUT_MS: '3600000'  # 1 hour (Mistral is local, usually faster)

evaluateOptions:
  maxConcurrency: 1  # Sequential to avoid VRAM collision between LLaDA and Mistral

prompts:
- '{{prompt}}'

providers:
- id: file://..\..\..\..\..\evaluation\promptfoo\llada_api_provider.py
  label: LLaDA Student

tests:
# Test 1: Football Coach Motivation Speech (5 assertions)
- assert:
  - type: python
    value: |
      import sys
      sys.path.insert(0, '.')
      from mistral_judge_provider import evaluate_yes_no
      return evaluate_yes_no(output, "Does the output sound like it was written from the perspective of a football coach (appropriate tone, authority, team focus)?")
  - type: python
    value: |
      import sys
      sys.path.insert(0, '.')
      from mistral_judge_provider import evaluate_yes_no
      return evaluate_yes_no(output, "Does the output acknowledge or reference the current 2-0 deficit?")
  - type: python
    value: |
      import sys
      sys.path.insert(0, '.')
      from mistral_judge_provider import evaluate_yes_no
      return evaluate_yes_no(output, "Does the output include specific, actionable tactical advice for the second half (e.g. pressing higher, defensive adjustments, set pieces)?")
  - type: python
    value: |
      import sys
      sys.path.insert(0, '.')
      from mistral_judge_provider import evaluate_yes_no
      return evaluate_yes_no(output, "Does the speech address the team's mindset or belief in a comeback, beyond just tactical points?")
  - type: python
    value: |
      import sys
      sys.path.insert(0, '.')
      from mistral_judge_provider import evaluate_yes_no
      return evaluate_yes_no(output, "Is the speech motivational in tone (inspiring, energetic, positive)?")
  vars:
    prompt: Act as a football coach. My team is losing 2-0 at halftime. What should I say to my players to motivate them for the second half?

