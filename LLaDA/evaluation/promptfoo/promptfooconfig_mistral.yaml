# Test 5: Matrix Movie Summary (5 assertions)
- assert:
  - type: python
    value: |
      import re
      text = output.strip()
      sentences = [s.strip() for s in re.split(r'(?<=[.!?])\s+', text) if s.strip()]
      return len(sentences) == 3
  - type: python
    value: |
      import sys
      sys.path.insert(0, '.')
      from mistral_judge_provider import evaluate_yes_no
      return evaluate_yes_no(output, "Does the summary mention Neo as the main character?")
  - type: python
