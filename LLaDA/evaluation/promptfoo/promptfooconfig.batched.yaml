      , \"Does it recommend a boiling time in the range of 6 to 8 minutes for a medium-boiled\
      \ egg?\", \"Does it mention placing the egg in cold or ice water after boiling\
      \ to stop the cooking process?\", \"Are the steps presented in logical chronological\
      \ order (e.g. boil water → add egg → time → cool)?\", \"Does the response describe\
      \ the expected result or texture of a medium-boiled egg (e.g. set white, jammy\
      \ or slightly soft yolk)?\"]\ndef _to_bool_answer(item):\n  if isinstance(item,\
      \ bool):\n    return item\n  if isinstance(item, dict):\n    item = item.get('answer',\
      \ item.get('verdict', ''))\n  text = str(item).strip().lower()\n  return text\
      \ in {'yes', 'true', '1', 'pass', 'passed'}\n\ndef _parse_content(content_text):\n\
      \  text = str(content_text or '').strip()\n  if not text:\n    return None\n\
      \  if text.startswith('```'):\n    text = re.sub(r'^```(?:json)?\\s*', '', text)\n\
      \    text = re.sub(r'\\s*```$', '', text)\n  parsed = None\n  try:\n    parsed\
      \ = json.loads(text)\n  except Exception:\n    pass\n  if parsed is None:\n\
      \    m = re.search(r'\\{[\\s\\S]*\\}', text)\n    if m:\n      try:\n      \
      \  parsed = json.loads(m.group(0))\n      except Exception:\n        parsed\
      \ = None\n  if parsed is None:\n    m = re.search(r'\\[[\\s\\S]*\\]', text)\n\
      \    if m:\n      try:\n        parsed = json.loads(m.group(0))\n      except\
      \ Exception:\n        parsed = None\n  return parsed\n\ndef _normalize_answers(parsed,\
      \ questions):\n  if isinstance(parsed, dict):\n    if isinstance(parsed.get('answers'),\
      \ list):\n      return {str(i): parsed['answers'][i] for i in range(len(parsed['answers']))}\n\
      \    numeric_keys = True\n    for k in parsed.keys():\n      if not str(k).isdigit():\n\
      \        numeric_keys = False\n        break\n    if numeric_keys:\n      return\
      \ {str(k): v for k, v in parsed.items()}\n    out = {}\n    for i, q in enumerate(questions):\n\
      \      if q in parsed:\n        out[str(i)] = parsed[q]\n    return out\n  if\
      \ isinstance(parsed, list):\n    return {str(i): parsed[i] for i in range(len(parsed))}\n\
      \  return {}\n\ndef ask_batched(out, idx):\n  cache_input = out + '\\n' + json.dumps(questions,\
      \ ensure_ascii=False)\n  key = hashlib.sha256(cache_input.encode('utf-8')).hexdigest()\n\
      \  cache = os.path.join(tempfile.gettempdir(), f'promptfoo_batched_v2_{key}.json')\n\
      \  data = None\n  if os.path.exists(cache):\n    try:\n      with open(cache,'r',encoding='utf-8')\
      \ as f:\n        data = json.load(f)\n    except Exception:\n      data = None\n\
      \  if data is None:\n    payload = {\n      \"model\": \"llama3.1:8b\",\n  \
      \    \"stream\": False,\n      \"options\": {\"temperature\": 0, \"num_gpu\"\
      : 0, \"num_predict\": 64},\n      \"messages\": [\n        {\"role\": \"system\"\
      , \"content\": \"Respond ONLY with JSON: produce a mapping from index to {\\\
      \"answer\\\":\\\"Yes\\\" or \\\"No\\\", \\\"reason\\\":\\\"...\\\"}. No other\
      \ text.\"},\n        {\"role\": \"user\", \"content\": f'<o>{out}</o>\\n' +\
      \ '\\n'.join(f'{i}: {q}' for i,q in enumerate(questions)) }\n      ]\n    }\n\
      \    try:\n      p = json.dumps(payload).encode()\n      r = urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:11434/api/chat',data=p,headers={'Content-Type':'application/json'}),timeout=300)\n\
      \    except Exception:\n      return False\n    try:\n      raw = r.read()\n\
      \      if isinstance(raw, bytes): raw = raw.decode('utf-8', errors='replace')\n\
      \      resp = json.loads(raw)\n      content_text = resp.get('message', {}).get('content',\
      \ '')\n      parsed = _parse_content(content_text)\n      data = _normalize_answers(parsed,\
      \ questions)\n    except Exception:\n      return False\n    try:\n      with\
      \ open(cache,'w',encoding='utf-8') as f:\n        json.dump(data,f)\n    except\
      \ Exception:\n      pass\n  try:\n    return _to_bool_answer(data.get(str(idx),\
      \ ''))\n  except Exception:\n    return False\n\nreturn ask_batched(output,\
      \ 1)\n"
