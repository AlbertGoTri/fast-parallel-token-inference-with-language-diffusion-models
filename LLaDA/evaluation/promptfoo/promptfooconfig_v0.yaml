# promptfooconfig.yaml
# Evaluation configuration for the Student Model (LLaDA)
#
# This configuration uses a local Ollama model (llama3.1:8b) as judge to evaluate
# LLaDA outputs using Yes/No questions. The judge returns pass/fail results that
# are aggregated into an overall accuracy percentage.
#
# USAGE:
#   1. Ensure Ollama is running and llama3.1:8b is pulled: ollama pull llama3.1:8b
#   2. Ensure serve_llada.py is running (python serve_llada.py)
#   3. Run: npx promptfoo eval
#   4. View results: npx promptfoo view
#   5. Generate HTML report: python generate_report.py
#
# IMPORTANT:
#   LLaDA generation and Ollama evaluation run sequentially to avoid VRAM collision.
#   The maxConcurrency: 1 ensures only one assertion runs at a time.

evaluateOptions:
  maxConcurrency: 1

env:
  # Must be high enough for rate-limited judge to complete
  PROMPTFOO_REQUEST_TIMEOUT_MS: "3600000"

defaults:
  test:
    options:
      # Run assertions sequentially to respect rate limits
      runSerially: true

providers:
  - id: file://llada_api_provider.py
    label: "LLaDA Student"

prompts:
  - '{{prompt}}'

# Default judge for ALL assertions - uses local Ollama model
defaultTest:
  options:
    provider:
      id: file://ollama_judge_provider.js
      label: "Ollama Judge (llama3.1:8b)"

